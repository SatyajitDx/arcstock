<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ArcStock | Modern Web3 Trading</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --app-bg: #0f121a;
            --card-bg: #1a1f2e;
            --accent-pink: #ff4d6d;
            --accent-blue: #3b82f6;
            --text-white: #ffffff;
            --text-dim: #94a3b8;
            --buy-green: #10b981;
            --sell-red: #eb5b5b;
            --border: #334155;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body { background-color: #000; color: var(--text-white); display: flex; justify-content: center; min-height: 100vh; }

        .app-container {
            width: 100%; max-width: 450px; background: var(--app-bg); min-height: 100vh;
            position: relative; padding: 20px; padding-bottom: 100px;
        }

        /* Fixed Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-top: 5px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .arc-logo {
            width: 24px;
            height: 24px;
            background: linear-gradient(135deg, #3b82f6, #10b981);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 800;
            color: white;
        }

        .app-logo { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; }
        .app-logo span { color: var(--buy-green); }

        .btn-connect {
            background: var(--accent-blue);
            color: white;
            padding: 8px 14px;
            border-radius: 10px;
            border: none;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .screen { display: none; }
        .screen.active { display: block; }

        /* Portfolio Card */
        .portfolio-card {
            background: linear-gradient(135deg, #ff4d6d, #ff85a1);
            padding: 25px; border-radius: 24px; margin-bottom: 30px;
        }
        .portfolio-card p { font-size: 14px; opacity: 0.9; }
        .portfolio-card h1 { font-size: 32px; margin: 10px 0; font-weight: 800; }
        .p-change { background: rgba(255,255,255,0.2); padding: 5px 12px; border-radius: 20px; font-size: 12px; display: inline-block; font-weight: 600; }

        /* Featured Scroll */
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .section-header h3 { font-size: 16px; font-weight: 600; }
        .see-all { color: var(--text-dim); font-size: 12px; }

        .featured-scroll { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 25px; scrollbar-width: none; }
        .featured-scroll::-webkit-scrollbar { display: none; }
        .featured-card { min-width: 160px; background: var(--card-bg); padding: 20px; border-radius: 20px; cursor: pointer; }
        .f-logo { width: 35px; height: 35px; border-radius: 50%; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; font-weight: 800; color: white; }

        /* Watchlist */
        .watchlist-item { background: var(--card-bg); padding: 15px; border-radius: 20px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
        .w-info { display: flex; align-items: center; gap: 12px; }
        .w-logo { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; color: white; }
        .w-name p:first-child { font-weight: 700; font-size: 14px; }
        .w-name p:last-child { color: var(--text-dim); font-size: 11px; }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed; bottom: 20px; width: calc(100% - 40px); max-width: 410px;
            background: rgba(255,255,255,0.1); backdrop-filter: blur(20px);
            border-radius: 35px; display: flex; justify-content: space-around; padding: 10px;
            z-index: 1000;
        }
        .nav-item { width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; color: var(--text-dim); }
        .nav-item.active { background: white; color: black; }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- New Header with Logo and Wallet -->
        <header class="header">
            <div class="brand">
                <div class="arc-logo">A</div>
                <div class="app-logo">ARC<span>STOCK</span></div>
            </div>
            <button class="btn-connect" id="connectBtn">Connect Wallet</button>
        </header>

        <!-- HOME SCREEN -->
        <div id="home" class="screen active">
            <div class="portfolio-card">
                <p>Your portfolio</p>
                <h1>₹8,15,590.90</h1>
                <div class="p-change">↗ ₹12,205.50 (+1.76%)</div>
            </div>

            <div class="section-header">
                <h3>Featured Investments</h3>
                <span class="see-all">See all</span>
            </div>
            <div class="featured-scroll">
                <div class="featured-card">
                    <div class="f-logo" style="background: #e31e24;">R</div>
                    <p style="font-weight: 700;">RELIANCE</p>
                    <p style="font-size: 11px; color: var(--text-dim); margin-bottom: 10px;">Reliance Industries</p>
                    <p style="font-weight: 700;">₹2,985</p>
                </div>
                <div class="featured-card">
                    <div class="f-logo" style="background: #00529b;">H</div>
                    <p style="font-weight: 700;">HDFCBANK</p>
                    <p style="font-size: 11px; color: var(--text-dim); margin-bottom: 10px;">HDFC Bank Ltd</p>
                    <p style="font-weight: 700;">₹1,532</p>
                </div>
            </div>

            <div class="section-header">
                <h3>My watchlist</h3>
                <span class="see-all">See all</span>
            </div>
            <div class="watchlist">
                <div class="watchlist-item">
                    <div class="w-info">
                        <div class="w-logo" style="background: #ff8c00;">T</div>
                        <div class="w-name"><p>TATAMOTORS</p><p>Tata Motors</p></div>
                    </div>
                    <div style="text-align: right;"><p>₹1,012.20</p><p style="color: var(--sell-red); font-size: 11px;">-6.34%</p></div>
                </div>
            </div>
        </div>

        <!-- NAVIGATION -->
        <nav class="bottom-nav">
            <div class="nav-item active" onclick="showScreen('home', this)">🏠</div>
            <div class="nav-item">📈</div>
            <div class="nav-item">💼</div>
        </nav>
    </div>

    <script>
        function showScreen(screenId, element) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            element.classList.add('active');
        }
    </script>
</body>
</html>
